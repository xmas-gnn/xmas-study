<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Navigation — Case 1</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0b14;
    color: #c8c2b6;
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    padding: 8px;
    gap: 4px;
  }
  .canvas-wrap {
    position: relative;
    border: 1px solid #1e2036;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    flex: 1;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas { display: block; background: #0d0e1a; max-height: 100%; max-width: 100%; width: auto; height: auto; }
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  button {
    font-family: inherit;
    font-size: 12px;
    padding: 6px 14px;
    border: 1px solid #2a2d3e;
    border-radius: 5px;
    background: #13152a;
    color: #c8c2b6;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  button:hover { border-color: #3b82f6; color: #fff; }
  button.active { border-color: #3b82f6; background: rgba(59,130,246,0.15); color: #3b82f6; }
  input[type=range] {
    width: 220px;
    accent-color: #3b82f6;
    height: 4px;
  }
  .info { font-size: 11px; color: #6b7280; }
  .info span { color: #c8c2b6; font-weight: 600; }
  .legend {
    display: flex;
    gap: 18px;
    font-size: 11px;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.2);
  }
  .toggle-row {
    display: flex; gap: 8px; align-items: center;
  }
  .toggle-row label { font-size: 11px; color: #6b7280; cursor: pointer; display: flex; align-items: center; gap: 4px; }
  .toggle-row input { accent-color: #3b82f6; }
</style>
</head>
<body>

<div class="canvas-wrap">
  <canvas id="c" width="640" height="640"></canvas>
</div>

<div class="controls">
  <button id="playBtn" onclick="togglePlay()">&#9654; Play</button>
  <button onclick="stepBack()">&#9666; Step</button>
  <button onclick="stepFwd()">Step &#9656;</button>
  <input type="range" id="slider" min="0" max="75" value="0" oninput="seekTo(+this.value)">
  <div class="info">t = <span id="tLabel">0</span> / 75</div>
</div>

<div class="controls">
  <span class="info">Speed:</span>
  <button onclick="setSpeed(0.5)">0.5&times;</button>
  <button id="sp1" onclick="setSpeed(1)">1&times;</button>
  <button onclick="setSpeed(2)">2&times;</button>
  <button class="active" onclick="setSpeed(4)">4&times;</button>
</div>

<div class="toggle-row">
  <label><input type="checkbox" id="trailToggle" checked onchange="draw()"> Trails</label>
  <label><input type="checkbox" id="goalToggle" checked onchange="draw()"> Goals</label>
  <label><input type="checkbox" id="gridToggle" checked onchange="draw()"> Grid</label>
  <label><input type="checkbox" id="interpToggle" checked> Interpolate</label>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>Agent 0</div>
  <div class="legend-item"><div class="legend-dot" style="background:#eab308"></div>Agent 1</div>
  <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>Agent 2</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>Agent 3</div>
</div>

  return m || 1;
})();
const ARROW_MAX = 0.30;  // world-unit length of the fastest arrow
const ARROW_EPS = 0.15;  // minimum fraction shown even when nearly stopped

let t = 0, playing = false, speed = 1, animT = 0, lastTime = 0;

function w2px(wx, wy) {
  const px = PAD + ((wx - WORLD_MIN) / WORLD_SIZE) * DRAW_W;
  const py = PAD + ((WORLD_MAX - wy) / WORLD_SIZE) * DRAW_H;
  return [px, py];
}

function worldToPx(dist) { return (dist / WORLD_SIZE) * DRAW_W; }
function lerp(a, b, f) { return a + (b - a) * f; }

function getAgentState(agent, time) {
  const idx = Math.floor(time);
  const frac = time - idx;
  if (idx >= DATA[agent].length - 1) return DATA[agent][DATA[agent].length - 1];
  if (!document.getElementById('interpToggle').checked || frac === 0) return DATA[agent][idx];
  const a = DATA[agent][idx], b = DATA[agent][idx + 1];
  return [lerp(a[0],b[0],frac), lerp(a[1],b[1],frac), lerp(a[2],b[2],frac), lerp(a[3],b[3],frac)];
}

function drawGrid() {
  if (!document.getElementById('gridToggle').checked) return;
  ctx.strokeStyle = '#1a1c32';
  ctx.lineWidth = 1;
  ctx.setLineDash([]);
  for (let v = WORLD_MIN; v <= WORLD_MAX + 0.01; v += 0.5) {
    const [x1,y1] = w2px(v, WORLD_MIN);
    const [x2,y2] = w2px(v, WORLD_MAX);
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    const [x3,y3] = w2px(WORLD_MIN, v);
    const [x4,y4] = w2px(WORLD_MAX, v);
    ctx.beginPath(); ctx.moveTo(x3,y3); ctx.lineTo(x4,y4); ctx.stroke();
  }
  ctx.strokeStyle = '#2a2d48';
  ctx.lineWidth = 1.5;
  const [ox1,oy1] = w2px(0, WORLD_MIN);
  const [ox2,oy2] = w2px(0, WORLD_MAX);
  ctx.beginPath(); ctx.moveTo(ox1,oy1); ctx.lineTo(ox2,oy2); ctx.stroke();
  const [ax1,ay1] = w2px(WORLD_MIN, 0);
  const [ax2,ay2] = w2px(WORLD_MAX, 0);
  ctx.beginPath(); ctx.moveTo(ax1,ay1); ctx.lineTo(ax2,ay2); ctx.stroke();
  ctx.fillStyle = '#4b5563';
  ctx.font = '10px JetBrains Mono';
  ctx.textAlign = 'center';
  for (let v = WORLD_MIN; v <= WORLD_MAX + 0.01; v += 0.5) {
    const [lx, ly] = w2px(v, WORLD_MIN);
    ctx.fillText(v.toFixed(1), lx, ly + 14);
    const [lx2, ly2] = w2px(WORLD_MIN, v);
    ctx.textAlign = 'right';
    ctx.fillText(v.toFixed(1), lx2 - 6, ly2 + 4);
    ctx.textAlign = 'center';
  }
  ctx.fillStyle = '#6b7280';
  ctx.font = '11px JetBrains Mono';
  ctx.textAlign = 'center';
  ctx.fillText('2.0 \u00d7 2.0 environment  [\u22121.0, 1.0]', W/2, H - 6);
  ctx.fillText('X', W/2, PAD + DRAW_H + 30);
  ctx.save();
  ctx.translate(12, PAD + DRAW_H/2);
  ctx.rotate(-Math.PI/2);
  ctx.fillText('Y', 0, 0);
  ctx.restore();
}

function drawTrails(upToTime) {
  if (!document.getElementById('trailToggle').checked) return;
  const maxT = Math.floor(upToTime);
  for (let a = 0; a < 4; a++) {
    ctx.strokeStyle = COLORS_TRAIL[a];
    ctx.lineWidth = 1.5;
    ctx.setLineDash([]);
    ctx.beginPath();
    for (let i = 0; i <= maxT && i < DATA[a].length; i++) {
      const [px, py] = w2px(DATA[a][i][0], DATA[a][i][1]);
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    if (upToTime > maxT && maxT < DATA[a].length - 1) {
      const s = getAgentState(a, upToTime);
      const [px, py] = w2px(s[0], s[1]);
      ctx.lineTo(px, py);
    }
    ctx.stroke();
    const [sx, sy] = w2px(DATA[a][0][0], DATA[a][0][1]);
    ctx.fillStyle = COLORS_DIM[a];
    ctx.beginPath(); ctx.arc(sx, sy, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#4b5563';
    ctx.font = '9px JetBrains Mono';
    ctx.textAlign = 'center';
    ctx.fillText('start', sx, sy - 8);
  }
}

function drawGoals() {
  if (!document.getElementById('goalToggle').checked) return;
  for (let a = 0; a < 4; a++) {
    const [gx, gy] = w2px(GOALS[a][0], GOALS[a][1]);
    const r = 6;
    ctx.strokeStyle = COLORS[a];
    ctx.lineWidth = 1.5;
    ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(gx-r, gy-r); ctx.lineTo(gx+r, gy+r); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(gx+r, gy-r); ctx.lineTo(gx-r, gy+r); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#4b5563';
    ctx.font = '9px JetBrains Mono';
    ctx.textAlign = 'center';
    ctx.fillText('goal', gx, gy - 10);
  }
}

function drawAgent(a, time) {
  const state = getAgentState(a, time);
  const [px, py, vx, vy] = state;
  const [cx, cy] = w2px(px, py);
  const r = worldToPx(AGENT_R);

  ctx.shadowColor = COLORS[a];
  ctx.shadowBlur = 8;
  ctx.fillStyle = COLORS[a];
  ctx.globalAlpha = 0.3;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;

  ctx.strokeStyle = COLORS[a];
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();

  ctx.fillStyle = COLORS[a];
  ctx.beginPath(); ctx.arc(cx, cy, 2, 0, Math.PI*2); ctx.fill();

  const vel = Math.sqrt(vx*vx + vy*vy);
  if (vel > 0.001) {
    const heading = Math.atan2(vy, vx);
    const norm = Math.min(vel / velMax, 1.0);
    const lineLen = worldToPx(ARROW_MAX * (norm + ARROW_EPS));
    const ex = cx + Math.cos(heading) * lineLen;
    const ey = cy - Math.sin(heading) * lineLen;

    ctx.strokeStyle = COLORS[a];
    ctx.lineWidth = 2;
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(ex, ey); ctx.stroke();

    const angle = Math.atan2(ey - cy, ex - cx);
    const aLen = 5;
    ctx.fillStyle = COLORS[a];
    ctx.beginPath();
    ctx.moveTo(ex, ey);
    ctx.lineTo(ex - aLen*Math.cos(angle - 0.35), ey - aLen*Math.sin(angle - 0.35));
    ctx.lineTo(ex - aLen*Math.cos(angle + 0.35), ey - aLen*Math.sin(angle + 0.35));
    ctx.closePath(); ctx.fill();
  }

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px JetBrains Mono';
  ctx.textAlign = 'center';
  ctx.fillText(a, cx, cy + r + 14);

  ctx.fillStyle = '#6b7280';
  ctx.font = '9px JetBrains Mono';
  ctx.fillText('v=' + vel.toFixed(3), cx, cy + r + 25);
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawGrid();
  drawTrails(animT);
  drawGoals();
  for (let a = 0; a < 4; a++) drawAgent(a, animT);

  ctx.fillStyle = 'rgba(10,11,20,0.8)';
  ctx.fillRect(PAD, PAD, 100, 28);
  ctx.fillStyle = '#c8c2b6';
  ctx.font = '13px JetBrains Mono';
  ctx.textAlign = 'left';
  ctx.fillText('t = ' + Math.floor(animT), PAD + 8, PAD + 18);

  document.getElementById('slider').value = Math.floor(animT);
  document.getElementById('tLabel').textContent = Math.floor(animT);
}

function animate(now) {
  if (!playing) return;
  if (!lastTime) lastTime = now;
  const dt = (now - lastTime) / 1000;
  lastTime = now;
  animT += dt * speed * 10;
  if (animT >= MAX_T) { animT = MAX_T; playing = false; updatePlayBtn(); }
  draw();
  if (playing) requestAnimationFrame(animate);
}

function togglePlay() {
  playing = !playing;
  if (playing) {
    if (animT >= MAX_T) animT = 0;
    lastTime = 0;
    requestAnimationFrame(animate);
  }
  updatePlayBtn();
}

function updatePlayBtn() {
  document.getElementById('playBtn').textContent = playing ? '\u23f8 Pause' : '\u25b6 Play';
  document.getElementById('playBtn').classList.toggle('active', playing);
}

function seekTo(val) { animT = val; draw(); }
function stepFwd() { animT = Math.min(MAX_T, Math.floor(animT) + 1); draw(); }
function stepBack() { animT = Math.max(0, Math.floor(animT) - 1); draw(); }

function setSpeed(s) {
  speed = s;
  document.querySelectorAll('.controls button').forEach(b => {
    if (b.textContent.includes('\u00d7')) b.classList.remove('active');
  });
  event.target.classList.add('active');
}

draw();
</script>
</body>
</html>
