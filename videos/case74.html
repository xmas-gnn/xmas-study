,[-0.453772,0.2894746,0.1169401,0.0279682],[-0.4427014,0.292338,0.1260403,0.0337395],[-0.4311711,0.296102,0.1291519,0.0458637],[-0.4193407,0.3011743,0.1325966,0.0616072],[-0.4071159,0.3077329,0.1374496,0.078506],[-0.394364,0.3157897,0.1438049,0.0950262],[-0.3809772,0.3252801,0.1512114,0.1106605],[-0.3668805,0.3360826,0.1593383,0.1247121],[-0.3520174,0.3480373,0.1680501,0.1368885],[-0.3363233,0.3609503,0.1775425,0.1467729],[-0.3197022,0.3745739,0.1882486,0.153672],[-0.3020518,0.3885612,0.2000483,0.1562843],[-0.2833322,0.4023817,0.2119693,0.1521999],[-0.2636137,0.4153075,0.2226563,0.1393299],[-0.2430489,0.4267028,0.2314193,0.1202576],[-0.2218299,0.4365865,0.2379397,0.1045987],[-0.2001251,0.4457177,0.2427765,0.0998865],[-0.1780782,0.4551625,0.2460603,0.1074713],[-0.15574,0.4659598,0.2492729,0.1262187],[-0.1329649,0.4789135,0.2549495,0.1527856],[-0.1094587,0.4944624,0.2642948,0.182756],[-0.085051,0.5125662,0.2746472,0.2103497],[-0.0600066,0.5324681,0.2800832,0.226523],[-0.0347605,0.5530901,0.2807271,0.230439],[-0.0094892,0.5737002,0.2808252,0.2282817],[0.0159186,0.5940502,0.2830494,0.2250265],[0.0416282,0.6140943,0.28697,0.221556],[0.0675538,0.6335553,0.2886084,0.2135718],[0.0932201,0.6516945,0.2834668,0.1955322],[0.1182638,0.6679155,0.2756618,0.1725834],[0.142767,0.6822078,0.2705555,0.1519142],[0.1670679,0.6949754,0.2697369,0.1368377],[0.191545,0.7067829,0.2730829,0.1283731],[0.2165357,0.7181976,0.2799705,0.126058],[0.2422977,0.7296539,0.2893821,0.1279095],[0.268935,0.741322,0.2992633,0.1305127],[0.2962641,0.7530419,0.3058533,0.1300744],[0.3237048,0.7644079,0.30442,0.1243964],[0.3506008,0.7749747,0.2960566,0.1139153],[0.3767054,0.7843876,0.2870476,0.0999252],[0.4021532,0.7924182,0.2806067,0.0838795],[0.4272077,0.7989072,0.2772714,0.0662106],[0.4521167,0.8036815,0.2765131,0.0464688],[0.4770464,0.8065474,0.2772397,0.0245291],[0.5020388,0.8073292,0.2779207,0.0007648],[0.5270057,0.8058789,0.2771547,-0.0245546],[0.5518062,0.8020361,0.2747637,-0.051769],[0.5764046,0.7956126,0.2725911,-0.0811721],[0.6009325,0.7863569,0.2725022,-0.1136762],[0.6256285,0.7740035,0.2753483,-0.1490535],[0.6506875,0.7584321,0.2799757,-0.1849947],[0.6760104,0.7398078,0.2820603,-0.2179083],[0.7006842,0.7185835,0.2702,-0.2447853],[0.7233273,0.6952817,0.2422852,-0.2659693],[0.7435018,0.6702823,0.2150992,-0.2836727],[0.7616322,0.6438246,0.1946232,-0.2991248],[0.7782349,0.6160839,0.1794004,-0.3127836],[0.7935392,0.5872266,0.1653718,-0.3245629],[0.8072252,0.5574527,0.1454139,-0.3339504],[0.818416,0.5270019,0.1138059,-0.3405399],[0.8263349,0.4960861,0.0750786,-0.3449923],[0.8307363,0.4648382,0.0358172,-0.3483026],[0.8317206,0.4333482,-0.0015025,-0.3506816],[0.8294072,0.4017352,-0.0378069,-0.3515426],[0.8238457,0.3701638,-0.0737886,-0.3504193],[0.8151375,0.3387679,-0.1082422,-0.3480556],[0.8034973,0.3075979,-0.1398824,-0.3454732],[0.7892033,0.2766605,-0.168292,-0.3428855],[0.7725442,0.2459889,-0.193506,-0.3397504],[0.7538236,0.2157449,-0.215257,-0.3341923],[0.7333746,0.1864376,-0.2331874,-0.321359],[0.7115657,0.1589949,-0.2468872,-0.2966975],[0.6887848,0.1345291,-0.2562379,-0.2594153],[0.6654786,0.1146905,-0.2603172,-0.200935],[0.6421067,0.1012195,-0.2593745,-0.1240503],[0.6189775,0.0949027,-0.2557979,-0.0432542],[0.5962264,0.0955794,-0.2512867,0.0329053]]];

const GOALS=[[0.19945,0.12733],[0.42611,0.48433],[0.43658,-0.3242],[0.48907,0.15415]];

const COLORS = ['#3b82f6','#eab308','#22c55e','#ef4444'];
const COLORS_DIM = ['rgba(59,130,246,0.25)','rgba(234,179,8,0.25)','rgba(34,197,94,0.25)','rgba(239,68,68,0.25)'];
const COLORS_TRAIL = ['rgba(59,130,246,0.5)','rgba(234,179,8,0.5)','rgba(34,197,94,0.5)','rgba(239,68,68,0.5)'];

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const WORLD_MIN = -1.0, WORLD_MAX = 1.0;
const WORLD_SIZE = WORLD_MAX - WORLD_MIN;
const PAD = 50;
const DRAW_W = W - 2*PAD, DRAW_H = H - 2*PAD;
const AGENT_R = 0.1;
const velMax = (() => {
  let m = 0;
  for (let a = 0; a < DATA.length; a++)
    for (let t = 0; t < DATA[a].length; t++) {
      const [,,vx,vy] = DATA[a][t];
      const v = Math.sqrt(vx*vx + vy*vy);
      if (v > m) m = v;
    }
  return m || 1;
})();
const ARROW_MAX = 0.30;  // world-unit length of the fastest arrow
const ARROW_EPS = 0.15;  // minimum fraction shown even when nearly stopped
const MAX_T = 88;

let t = 0, playing = false, speed = 1, animT = 0, lastTime = 0;

function w2px(wx, wy) {
  const px = PAD + ((wx - WORLD_MIN) / WORLD_SIZE) * DRAW_W;
  const py = PAD + ((WORLD_MAX - wy) / WORLD_SIZE) * DRAW_H;
  return [px, py];
}

function worldToPx(dist) {
  return (dist / WORLD_SIZE) * DRAW_W;
}

function lerp(a, b, f) { return a + (b - a) * f; }

function getAgentState(agent, time) {
  const idx = Math.floor(time);
  const frac = time - idx;
  if (idx >= DATA[agent].length - 1) return DATA[agent][DATA[agent].length - 1];
  if (!document.getElementById('interpToggle').checked || frac === 0) return DATA[agent][idx];
  const a = DATA[agent][idx], b = DATA[agent][idx + 1];
  return [lerp(a[0],b[0],frac), lerp(a[1],b[1],frac), lerp(a[2],b[2],frac), lerp(a[3],b[3],frac)];
}

function drawGrid() {
  if (!document.getElementById('gridToggle').checked) return;
  ctx.strokeStyle = '#1a1c32';
  ctx.lineWidth = 1;
  ctx.setLineDash([]);
  for (let v = WORLD_MIN; v <= WORLD_MAX + 0.01; v += 0.5) {
    const [x1,y1] = w2px(v, WORLD_MIN);
    const [x2,y2] = w2px(v, WORLD_MAX);
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    const [x3,y3] = w2px(WORLD_MIN, v);
    const [x4,y4] = w2px(WORLD_MAX, v);
    ctx.beginPath(); ctx.moveTo(x3,y3); ctx.lineTo(x4,y4); ctx.stroke();
  }
  ctx.strokeStyle = '#2a2d48';
  ctx.lineWidth = 1.5;
  const [ox1,oy1] = w2px(0, WORLD_MIN);
  const [ox2,oy2] = w2px(0, WORLD_MAX);
  ctx.beginPath(); ctx.moveTo(ox1,oy1); ctx.lineTo(ox2,oy2); ctx.stroke();
  const [ax1,ay1] = w2px(WORLD_MIN, 0);
  const [ax2,ay2] = w2px(WORLD_MAX, 0);
  ctx.beginPath(); ctx.moveTo(ax1,ay1); ctx.lineTo(ax2,ay2); ctx.stroke();

  ctx.fillStyle = '#4b5563';
  ctx.font = '10px JetBrains Mono';
  ctx.textAlign = 'center';
  for (let v = WORLD_MIN; v <= WORLD_MAX + 0.01; v += 0.5) {
    const [lx, ly] = w2px(v, WORLD_MIN);
    ctx.fillText(v.toFixed(1), lx, ly + 14);
    const [lx2, ly2] = w2px(WORLD_MIN, v);
    ctx.textAlign = 'right';
    ctx.fillText(v.toFixed(1), lx2 - 6, ly2 + 4);
    ctx.textAlign = 'center';
  }
  ctx.fillStyle = '#6b7280';
  ctx.font = '11px JetBrains Mono';
  ctx.textAlign = 'center';
  ctx.fillText('2.0 × 2.0 environment  [−1.0, 1.0]', W/2, H - 6);
  ctx.fillText('X', W/2, PAD + DRAW_H + 30);
  ctx.save();
  ctx.translate(12, PAD + DRAW_H/2);
  ctx.rotate(-Math.PI/2);
  ctx.fillText('Y', 0, 0);
  ctx.restore();
}

function drawTrails(upToTime) {
  if (!document.getElementById('trailToggle').checked) return;
  const maxT = Math.floor(upToTime);
  for (let a = 0; a < 4; a++) {
    ctx.strokeStyle = COLORS_TRAIL[a];
    ctx.lineWidth = 1.5;
    ctx.setLineDash([]);
    ctx.beginPath();
    for (let i = 0; i <= maxT && i < DATA[a].length; i++) {
      const [px, py] = w2px(DATA[a][i][0], DATA[a][i][1]);
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    if (upToTime > maxT && maxT < DATA[a].length - 1) {
      const s = getAgentState(a, upToTime);
      const [px, py] = w2px(s[0], s[1]);
      ctx.lineTo(px, py);
    }
    ctx.stroke();
    const [sx, sy] = w2px(DATA[a][0][0], DATA[a][0][1]);
    ctx.fillStyle = COLORS_DIM[a];
    ctx.beginPath(); ctx.arc(sx, sy, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#4b5563';
    ctx.font = '9px JetBrains Mono';
    ctx.textAlign = 'center';
    ctx.fillText('start', sx, sy - 8);
  }
}

function drawGoals() {
  if (!document.getElementById('goalToggle').checked) return;
  for (let a = 0; a < 4; a++) {
    const [gx, gy] = w2px(GOALS[a][0], GOALS[a][1]);
    const r = 6;
    ctx.strokeStyle = COLORS[a];
    ctx.lineWidth = 1.5;
    ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(gx-r, gy-r); ctx.lineTo(gx+r, gy+r); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(gx+r, gy-r); ctx.lineTo(gx-r, gy+r); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#4b5563';
    ctx.font = '9px JetBrains Mono';
    ctx.textAlign = 'center';
    ctx.fillText('goal', gx, gy - 10);
  }
}

function drawAgent(a, time) {
  const state = getAgentState(a, time);
  const [px, py, vx, vy] = state;
  const [cx, cy] = w2px(px, py);
  const r = worldToPx(AGENT_R);

  ctx.shadowColor = COLORS[a];
  ctx.shadowBlur = 8;
  ctx.fillStyle = COLORS[a];
  ctx.globalAlpha = 0.3;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;

  ctx.strokeStyle = COLORS[a];
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();

  ctx.fillStyle = COLORS[a];
  ctx.beginPath(); ctx.arc(cx, cy, 2, 0, Math.PI*2); ctx.fill();

  const vel = Math.sqrt(vx*vx + vy*vy);
  if (vel > 0.001) {
    const heading = Math.atan2(vy, vx);
    const norm = Math.min(vel / velMax, 1.0);
    const lineLen = worldToPx(ARROW_MAX * (norm + ARROW_EPS));
    const ex = cx + Math.cos(heading) * lineLen;
    const ey = cy - Math.sin(heading) * lineLen;

    ctx.strokeStyle = COLORS[a];
    ctx.lineWidth = 2;
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(ex, ey); ctx.stroke();

    const angle = Math.atan2(ey - cy, ex - cx);
    const aLen = 5;
    ctx.fillStyle = COLORS[a];
    ctx.beginPath();
    ctx.moveTo(ex, ey);
    ctx.lineTo(ex - aLen*Math.cos(angle - 0.35), ey - aLen*Math.sin(angle - 0.35));
    ctx.lineTo(ex - aLen*Math.cos(angle + 0.35), ey - aLen*Math.sin(angle + 0.35));
    ctx.closePath(); ctx.fill();
  }

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px JetBrains Mono';
  ctx.textAlign = 'center';
  ctx.fillText(a, cx, cy + r + 14);

  ctx.fillStyle = '#6b7280';
  ctx.font = '9px JetBrains Mono';
  ctx.fillText('v=' + vel.toFixed(3), cx, cy + r + 25);
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawGrid();
  drawTrails(animT);
  drawGoals();
  for (let a = 0; a < 4; a++) drawAgent(a, animT);

  ctx.fillStyle = 'rgba(10,11,20,0.8)';
  ctx.fillRect(PAD, PAD, 100, 28);
  ctx.fillStyle = '#c8c2b6';
  ctx.font = '13px JetBrains Mono';
  ctx.textAlign = 'left';
  ctx.fillText('t = ' + Math.floor(animT), PAD + 8, PAD + 18);

  document.getElementById('slider').value = Math.floor(animT);
  document.getElementById('tLabel').textContent = Math.floor(animT);
}

function animate(now) {
  if (!playing) return;
  if (!lastTime) lastTime = now;
  const dt = Math.min((now - lastTime) / 1000, 0.1);
  lastTime = now;
  animT += dt * speed * 10;
  if (animT >= MAX_T) { animT = MAX_T; playing = false; updatePlayBtn(); }
  draw();
  if (playing) requestAnimationFrame(animate);
}

function togglePlay() {
  playing = !playing;
  if (playing) {
    if (animT >= MAX_T) animT = 0;
    lastTime = 0;
    requestAnimationFrame(animate);
  }
  updatePlayBtn();
}

function updatePlayBtn() {
  document.getElementById('playBtn').textContent = playing ? '⏸ Pause' : '▶ Play';
  document.getElementById('playBtn').classList.toggle('active', playing);
}

document.addEventListener('visibilitychange', () => { if (!document.hidden) lastTime = 0; });
function seekTo(val) { animT = val; draw(); }
function stepFwd() { animT = Math.min(MAX_T, Math.floor(animT) + 1); draw(); }
function stepBack() { animT = Math.max(0, Math.floor(animT) - 1); draw(); }

function setSpeed(s) {
  speed = s;
  document.querySelectorAll('.controls button').forEach(b => {
    if (b.textContent.includes('×')) b.classList.remove('active');
  });
  event.target.classList.add('active');
}

draw();
</script>
